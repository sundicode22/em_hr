services:
  postgres:
    image: postgres:16-alpine
    container_name: em_management_db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: em_user
      POSTGRES_PASSWORD: em_password
      POSTGRES_DB: em_management
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U em_user -d em_management"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
